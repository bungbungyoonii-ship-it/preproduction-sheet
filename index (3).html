<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 숏폼 드라마 — 프리프로덕션</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeecea;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --radius:8px;--radius-lg:12px;
  --font:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f0f0f0;--text2:#aaa;--text3:#666;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
}}
body{font-family:var(--font);background:var(--bg3);color:var(--text);min-height:100vh;}
.top-nav{display:flex;align-items:center;border-bottom:0.5px solid var(--border2);background:var(--bg);padding:0 20px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.nav-title{font-size:13px;font-weight:500;color:var(--text2);padding:14px 16px 14px 0;border-right:0.5px solid var(--border);margin-right:12px;white-space:nowrap;}
.sheet-tab{font-size:13px;padding:14px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;}
.sheet-tab:hover{color:var(--text2);}
.sheet-tab.active{color:var(--text);border-bottom-color:var(--text);}
.save-indicator{font-size:11px;color:var(--text3);padding:14px 0;white-space:nowrap;}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:12px;}
.export-btn{font-size:12px;padding:6px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;}
.export-btn:hover{background:var(--bg3);}
.export-btn.primary{background:rgba(83,74,183,0.08);border-color:rgba(83,74,183,0.3);color:#534AB7;}
.export-btn.primary:hover{background:rgba(83,74,183,0.14);}
.export-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;}
.export-modal-overlay.open{display:flex;}
.export-modal{background:var(--bg);border-radius:var(--radius-lg);padding:24px;width:320px;border:0.5px solid var(--border2);}
.export-modal-title{font-size:15px;font-weight:500;color:var(--text);margin-bottom:16px;}
.export-option{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid var(--border);}
.export-option:last-child{border-bottom:none;}
.export-option-left{flex:1;}
.export-option-label{font-size:13px;color:var(--text);}
.export-option-desc{font-size:11px;color:var(--text3);margin-top:2px;}
.export-option-btn{font-size:12px;padding:6px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;white-space:nowrap;margin-left:12px;}
.export-option-btn:hover{background:var(--bg3);}
.export-modal-close{width:100%;margin-top:16px;font-size:13px;padding:8px;border-radius:var(--radius);border:0.5px solid var(--border2);background:none;color:var(--text3);cursor:pointer;}
.export-modal-close:hover{background:var(--bg2);}
.spec-bar{display:none;align-items:center;gap:8px;padding:8px 20px;background:var(--bg2);border-bottom:0.5px solid var(--border);}
.spec-bar.visible{display:flex;}
.spec-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--bg);border:0.5px solid var(--border2);color:var(--text2);}
.spec-badge.hi{background:rgba(83,74,183,0.08);border-color:rgba(83,74,183,0.3);color:#534AB7;}
.page{display:none;padding:24px 20px 80px;}
.page.active{display:block;}
.tab-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.tab{font-size:13px;padding:6px 14px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.tab:hover{background:var(--bg3);}
.tab.active{background:var(--bg);color:var(--text);border-color:var(--border2);}
.tab input.rename{font-size:13px;font-family:var(--font);border:none;outline:none;background:transparent;color:var(--text);min-width:40px;}
.tab-del{font-size:11px;color:var(--text3);cursor:pointer;}
.tab-del:hover{color:#e24b4a;}
.tab-add{font-size:13px;padding:6px 12px;border-radius:var(--radius);border:0.5px dashed var(--border2);background:none;color:var(--text3);cursor:pointer;}
.tab-add:hover{color:var(--text2);}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:14px;}
.sec-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.divider{height:0.5px;background:var(--border);margin:14px 0;}
.name-inp{font-size:18px;font-weight:500;font-family:var(--font);border:none;outline:none;background:transparent;color:var(--text);width:100%;margin-bottom:4px;}
.sub-inp{font-size:13px;font-family:var(--font);border:none;outline:none;background:transparent;color:var(--text2);width:100%;}
.field-inp{width:100%;font-size:13px;font-family:var(--font);border-radius:var(--radius);border:0.5px solid var(--border2);padding:7px 10px;color:var(--text);background:var(--bg2);outline:none;}
.prompt-area{width:100%;min-height:76px;font-size:13px;font-family:var(--font);border-radius:var(--radius);border:0.5px solid var(--border2);padding:10px 12px;color:var(--text);background:var(--bg2);resize:vertical;outline:none;line-height:1.6;}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;}
.img-wrap{display:flex;flex-direction:column;gap:3px;}
.img-thumb{width:100%;object-fit:cover;border-radius:var(--radius);border:0.5px solid var(--border);cursor:zoom-in;}
.img-thumb:hover{opacity:.82;}
.img-thumb.portrait{aspect-ratio:3/4;}
.img-thumb.landscape{aspect-ratio:16/10;}
.img-add{width:100%;border-radius:var(--radius);border:0.5px dashed var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:22px;}
.img-add:hover{background:var(--bg3);}
.img-add.portrait{aspect-ratio:3/4;}
.img-add.landscape{aspect-ratio:16/10;}
.del-btn{font-size:11px;color:var(--text3);text-align:center;cursor:pointer;}
.del-btn:hover{color:#e24b4a;}
.prop-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.prop-group{display:flex;flex-direction:column;flex:1;min-width:120px;}
.prop-label{font-size:11px;color:var(--text3);margin-bottom:4px;}
.prop-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;}
.prop-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;display:flex;flex-direction:column;gap:6px;position:relative;}
.prop-card-img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:6px;border:0.5px solid var(--border);cursor:zoom-in;}
.prop-card-img:hover{opacity:.82;}
.prop-img-empty{width:100%;aspect-ratio:1/1;border-radius:6px;border:0.5px dashed var(--border2);background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:20px;}
.prop-name-inp{font-size:12px;font-family:var(--font);border:none;outline:none;background:transparent;color:var(--text);width:100%;text-align:center;}
.prop-card-del{position:absolute;top:5px;right:7px;font-size:11px;color:var(--text3);cursor:pointer;}
.prop-card-del:hover{color:#e24b4a;}
.add-prop-card{background:var(--bg2);border:0.5px dashed var(--border2);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:12px;gap:4px;min-height:90px;}
.add-prop-card:hover{background:var(--bg3);}
.ep-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.ep-tab{font-size:12px;padding:4px 12px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;}
.ep-tab:hover{background:var(--bg3);}
.ep-tab.active{background:var(--bg);color:var(--text);border-color:var(--border2);}
.ep-del{font-size:10px;color:var(--text3);margin-left:4px;cursor:pointer;}
.ep-del:hover{color:#e24b4a;}
.ep-add{font-size:12px;padding:4px 10px;border-radius:var(--radius);border:0.5px dashed var(--border2);background:none;color:var(--text3);cursor:pointer;}
.ep-add:hover{color:var(--text2);}
.cast-section-title{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:0.5px solid var(--border);}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:12px;margin-bottom:24px;}
.cast-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.cast-card.main-char{border-color:rgba(83,74,183,0.4);background:rgba(83,74,183,0.04);}
.cast-card.sub-char{border-color:rgba(55,138,221,0.35);background:rgba(55,138,221,0.04);}
.cast-img{width:72px;height:96px;object-fit:cover;border-radius:var(--radius);border:0.5px solid var(--border);}
.cast-img-empty{width:72px;height:96px;border-radius:var(--radius);border:0.5px dashed var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:22px;}
.cast-name{font-size:13px;font-weight:500;color:var(--text);text-align:center;}
.cast-role{font-size:11px;color:var(--text3);text-align:center;}
.cast-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.cast-badge.main{background:rgba(83,74,183,0.12);color:#534AB7;}
.cast-badge.sub{background:rgba(55,138,221,0.1);color:#185FA5;}
.cast-empty{padding:32px 0;text-align:center;color:var(--text3);font-size:13px;}
.type-toggle{display:flex;gap:6px;margin-top:8px;}
.type-btn{font-size:12px;padding:4px 14px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text3);cursor:pointer;}
.type-btn.active-main{background:rgba(83,74,183,0.1);border-color:rgba(83,74,183,0.4);color:#534AB7;}
.type-btn.active-sub{background:rgba(55,138,221,0.1);border-color:rgba(55,138,221,0.4);color:#185FA5;}
.scene-card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:20px;overflow:hidden;}
.scene-header{display:flex;align-items:stretch;border-bottom:0.5px solid var(--border2);background:var(--bg2);}
.scene-num-block{display:flex;flex-direction:column;justify-content:center;padding:12px 16px;border-right:0.5px solid var(--border2);min-width:64px;}
.scene-num-label{font-size:10px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:2px;}
.scene-num-inp{font-size:20px;font-weight:500;font-family:var(--font);border:none;outline:none;background:transparent;color:var(--text);width:52px;}
.scene-title-block{flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:4px;border-right:0.5px solid var(--border2);}
.scene-loc-inp{font-size:15px;font-weight:500;font-family:var(--font);border:none;outline:none;background:transparent;color:var(--text);}
.scene-desc-inp{font-size:12px;font-family:var(--font);border:none;outline:none;background:transparent;color:var(--text2);}
.scene-meta-block{display:flex;flex-direction:column;gap:6px;padding:10px 14px;justify-content:center;}
.badge-row{display:flex;gap:5px;}
.badge-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text3);cursor:pointer;}
.badge-btn.active-int{background:rgba(83,74,183,0.1);border-color:rgba(83,74,183,0.35);color:#534AB7;}
.badge-btn.active-ext{background:rgba(15,110,86,0.1);border-color:rgba(15,110,86,0.35);color:#0F6E56;}
.badge-btn.active-day{background:rgba(186,117,23,0.1);border-color:rgba(186,117,23,0.35);color:#BA7517;}
.badge-btn.active-night{background:rgba(40,40,50,0.1);border-color:var(--border2);color:var(--text2);}
.cuts-list{padding:12px 16px;display:flex;flex-direction:column;gap:12px;}
.cut-row{display:grid;grid-template-columns:52px 120px 1fr;gap:12px;align-items:start;padding-bottom:12px;border-bottom:0.5px solid var(--border);}
.cut-row:last-child{border-bottom:none;padding-bottom:0;}
.cut-num-col{display:flex;flex-direction:column;align-items:flex-start;gap:4px;padding-top:4px;}
.cut-num{font-size:12px;font-weight:500;color:var(--text2);}
.cut-del-btn{font-size:11px;color:var(--text3);cursor:pointer;}
.cut-del-btn:hover{color:#e24b4a;}
.cut-img-col{display:flex;flex-direction:column;gap:6px;}
.cut-img{width:100%;aspect-ratio:9/16;object-fit:cover;border-radius:var(--radius);border:0.5px solid var(--border);cursor:zoom-in;}
.cut-img:hover{opacity:.85;}
.cut-img-empty{width:100%;aspect-ratio:9/16;border-radius:var(--radius);border:0.5px dashed var(--border2);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:20px;}
.cut-img-empty:hover{background:var(--bg3);}
.cut-cam-inp{font-size:11px;font-family:var(--font);color:var(--text2);border:none;outline:none;background:transparent;font-style:italic;width:100%;}
.cut-desc-col{display:flex;flex-direction:column;gap:6px;}
.cut-label{font-size:10px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase;margin-bottom:1px;}
.cut-ta{width:100%;font-size:13px;font-family:var(--font);border:none;outline:none;background:transparent;color:var(--text);resize:none;line-height:1.6;min-height:44px;}
.cut-divider{height:0.5px;background:var(--border);margin:2px 0;}
.add-cut-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;padding:10px 16px;border-top:0.5px solid var(--border);}
.add-cut-btn:hover{color:var(--text2);background:var(--bg2);}
.add-scene-btn{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--text3);cursor:pointer;padding:14px;border:0.5px dashed var(--border2);border-radius:var(--radius-lg);background:var(--bg);margin-bottom:20px;}
.add-scene-btn:hover{background:var(--bg2);}
.scene-del-btn{font-size:12px;color:var(--text3);cursor:pointer;padding:10px 14px;border-left:0.5px solid var(--border2);}
.scene-del-btn:hover{color:#e24b4a;}
.ep-nav-tab{font-size:13px;padding:14px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;white-space:nowrap;}
.ep-nav-tab:hover{color:var(--text2);}
.ep-nav-tab.active{color:var(--text);border-bottom-color:var(--text);}
.ep-nav-del{font-size:11px;margin-left:5px;color:var(--text3);cursor:pointer;}
.ep-nav-del:hover{color:#e24b4a;}
.ep-nav-add{font-size:13px;padding:14px 10px;color:var(--text3);cursor:pointer;}
.ep-nav-add:hover{color:var(--text2);}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px;}
.lb.open{display:flex;}
.lb img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:var(--radius-lg);}
.lb-close{font-size:13px;padding:8px 28px;border-radius:var(--radius);border:0.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:#fff;cursor:pointer;}
</style>
</head>
<body>

<nav class="top-nav" id="main-nav">
  <span class="nav-title">프리프로덕션</span>
  <span class="sheet-tab active" onclick="switchSheet(0)">인물 구성</span>
  <span class="sheet-tab" onclick="switchSheet(1)">캐릭터 자료</span>
  <span class="sheet-tab" onclick="switchSheet(2)">세계관 & 배경</span>
  <span class="sheet-tab" onclick="switchSheet(3)">콘티</span>
  <span id="ep-nav-wrap" style="display:none;align-items:center;border-left:0.5px solid var(--border);margin-left:8px;padding-left:8px;"></span>
  <div class="nav-right">
    <span class="save-indicator" id="save-indicator">불러오는 중...</span>
    <button class="export-btn primary" onclick="document.getElementById('export-modal').classList.add('open')">내보내기</button>
  </div>
</nav>

<div class="spec-bar" id="spec-bar">
  <span class="spec-badge hi">9:16</span>
  <span class="spec-badge hi">1080 × 1920</span>
  <span class="spec-badge hi">90초</span>
  <span class="spec-badge">MP4</span>
  <span class="spec-badge">24–60fps</span>
</div>

<div class="page active" id="page-cast"><div id="cast-content"></div></div>
<div class="page" id="page-char"><div class="tab-bar" id="char-tabs"></div><div id="char-content"></div></div>
<div class="page" id="page-world"><div class="tab-bar" id="world-tabs"></div><div id="world-content"></div></div>
<div class="page" id="page-conti"><div id="conti-content"></div></div>

<div class="export-modal-overlay" id="export-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="export-modal">
    <div class="export-modal-title">내보내기</div>
    <div class="export-option">
      <div class="export-option-left"><div class="export-option-label">Word 문서 (.docx)</div><div class="export-option-desc">인물 구성 + 캐릭터 자료 + 세계관 배경</div></div>
      <button class="export-option-btn" onclick="exportDocx()">다운로드</button>
    </div>
    <div class="export-option">
      <div class="export-option-left"><div class="export-option-label">PPT 파일 (.pptx)</div><div class="export-option-desc">콘티 — 씬/컷 구성 슬라이드</div></div>
      <button class="export-option-btn" onclick="exportPptx()">다운로드</button>
    </div>
    <div class="export-option">
      <div class="export-option-left"><div class="export-option-label">JSON 백업</div><div class="export-option-desc">전체 데이터 백업 및 복원</div></div>
      <button class="export-option-btn" onclick="exportJson()">다운로드</button>
    </div>
    <div class="export-option">
      <div class="export-option-left"><div class="export-option-label">JSON 불러오기</div><div class="export-option-desc">백업 파일로 데이터 복원</div></div>
      <button class="export-option-btn" onclick="importJson()">불러오기</button>
    </div>
    <button class="export-modal-close" onclick="document.getElementById('export-modal').classList.remove('open')">닫기</button>
  </div>
</div>

<div class="lb" id="lb" onclick="if(event.target===this)this.classList.remove('open')">
  <img id="lb-img" src="" alt="확대"/>
  <button class="lb-close" onclick="document.getElementById('lb').classList.remove('open')">닫기</button>
</div>

<script>
const SUPABASE_URL="https://lfabhpndobeguhiyvdfc.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmYWJocG5kb2JlZ3VoaXl2ZGZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0NzQxMTksImV4cCI6MjA5ODA1MDExOX0.DaS9d1WjWGpUEcZBzaGapomURKMchh2J6z1Hx-zSKNc";

async function dbLoad(){
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/pps_data?id=eq.main&select=*`,{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
    const d=await r.json();
    if(d&&d[0]){
      if(d[0].chars&&d[0].chars.length)chars=d[0].chars;
      if(d[0].spaces&&d[0].spaces.length)spaces=d[0].spaces;
      if(d[0].episodes&&d[0].episodes.length)episodes=d[0].episodes;
    }
    setSaveStatus("저장됨 ✓");
  }catch(e){setSaveStatus("오프라인 모드");}
}

let saveTimer=null;
function scheduleSave(){
  setSaveStatus("저장 중...");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(doSave,1200);
}
async function doSave(){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/pps_data?id=eq.main`,{
      method:"PATCH",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},

function setSaveStatus(t){document.getElementById("save-indicator").textContent=t;}

function rf(file,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);}
function pick(multi,cb){const i=document.createElement("input");i.type="file";i.accept="image/*";i.multiple=!!multi;i.onchange=e=>Array.from(e.target.files).forEach(f=>rf(f,cb));i.click();}
function lbOpen(src){document.getElementById("lb-img").src=src;document.getElementById("lb").classList.add("open");}

let curSheet=0;
function switchSheet(i){
  curSheet=i;
  document.querySelectorAll(".sheet-tab").forEach((t,j)=>t.classList.toggle("active",j===i));
  document.querySelectorAll(".page").forEach((p,j)=>p.classList.toggle("active",j===i));
  document.getElementById("spec-bar").classList.toggle("visible",i===3);
  document.getElementById("ep-nav-wrap").style.display=i===3?"flex":"none";

function makeImgGrid(arr,ratio,onDel,onAdd){
  const g=document.createElement("div");g.className="img-grid";
  arr.forEach((src,i)=>{
    const w=document.createElement("div");w.className="img-wrap";
    const img=document.createElement("img");img.className="img-thumb "+ratio;img.src=src;img.onclick=()=>lbOpen(src);
    const d=document.createElement("div");d.className="del-btn";d.textContent="삭제";d.onclick=()=>onDel(i);
    w.appendChild(img);w.appendChild(d);g.appendChild(w);
  });
  const a=document.createElement("div");a.className="img-add "+ratio;a.textContent="+";a.onclick=onAdd;
  g.appendChild(a);return g;
}

function makeTabs(items,cur,onSwitch,onAdd,onDel,addLabel,onRename){
  const bar=document.createElement("div");bar.className="tab-bar";
  items.forEach((item,i)=>{
    const t=document.createElement("span");t.className="tab"+(i===cur?" active":"");
    if(i===cur){
      const inp=document.createElement("input");inp.className="rename";inp.value=item.name;
      inp.style.width=Math.max(48,item.name.length*9)+"px";
      inp.oninput=()=>{item.name=inp.value;inp.style.width=Math.max(48,inp.value.length*9)+"px";if(onRename)onRename();scheduleSave();};
      inp.onkeydown=e=>{if(e.key==="Enter")inp.blur();};inp.onclick=e=>e.stopPropagation();
      t.appendChild(inp);
    } else {
      const s=document.createElement("span");s.textContent=item.name;t.onclick=()=>onSwitch(i);t.appendChild(s);
    }
    if(items.length>1){
      const d=document.createElement("span");d.className="tab-del";d.textContent="×";
      d.onclick=e=>{e.stopPropagation();onDel(i);};t.appendChild(d);
    }
    bar.appendChild(t);
  });
  const a=document.createElement("span");a.className="tab-add";a.textContent=addLabel;a.onclick=onAdd;
  bar.appendChild(a);return bar;
}

function exportJson(){
  const data=JSON.stringify({chars,spaces,episodes},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="preproduction_backup.json";a.click();
  closeExportModal();
}
function importJson(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.chars)chars=d.chars;
        if(d.spaces)spaces=d.spaces;
        if(d.episodes)episodes=d.episodes;
        renderCast();renderChar();renderWorld();renderContiNav();renderContiPage();
        scheduleSave();closeExportModal();
        alert("불러오기 완료!");
      }catch(e){alert("파일 형식이 올바르지 않습니다.");}
    };r.readAsText(f);
  };inp.click();
}

/* DOCX */
async function exportDocx(){
  const s=document.getElementById("save-indicator");s.textContent="Word 생성 중...";
  try{
    const {Document,Packer,Paragraph,TextRun,HeadingLevel,ImageRun,Table,TableRow,TableCell,WidthType,BorderStyle}=await import("https://esm.sh/docx@8");
    const children=[];
    const h1=(t)=>new Paragraph({text:t,heading:HeadingLevel.HEADING_1,spacing:{after:200}});
    const h2=(t)=>new Paragraph({text:t,heading:HeadingLevel.HEADING_2,spacing:{before:200,after:100}});
    const p=(t)=>new Paragraph({children:[new TextRun({text:t||"",size:24})],spacing:{after:80}});
    const line=()=>new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:1,color:"CCCCCC"}},spacing:{after:100}});

    /* 인물 구성 */
    children.push(h1("인물 구성"));
    ["메인 캐릭터","서브 캐릭터"].forEach(label=>{
      const list=chars.filter(c=>label==="메인 캐릭터"?c.type==="main":c.type==="sub");
      children.push(h2(label));
      if(list.length===0){children.push(p("없음"));}
      else list.forEach(c=>{children.push(p(`• ${c.name} — ${c.role||""}`));});
    });

    /* 캐릭터 자료 */
    children.push(h1("캐릭터 자료"));
    chars.forEach(c=>{
      children.push(h2(c.name+(c.role?` (${c.role})`:"")+(c.type&&c.type!=="none"?` [${c.type==="main"?"메인":"서브"}]`:"")));
      if(c.prompt){children.push(p("외모 프롬프트:"));children.push(p(c.prompt));}
      children.push(line());
    });

    /* 세계관 & 배경 */
    children.push(h1("세계관 & 배경"));
    spaces.forEach(s=>{
      children.push(h2(s.name+(s.desc?` — ${s.desc}`:"")));
      if(s.timeOfDay||s.lighting||s.season){
        children.push(p(`시간대: ${s.timeOfDay||"-"}  /  조명: ${s.lighting||"-"}  /  계절: ${s.season||"-"}`));
      }
      if(s.prompt){children.push(p("배경 프롬프트:"));children.push(p(s.prompt));}
      if(s.props&&s.props.length>0){
        children.push(p("소품: "+s.props.map(pp=>pp.name).filter(Boolean).join(", ")));
      }
      children.push(line());
    });

    const doc=new Document({sections:[{children}]});
    const buf=await Packer.toBlob(doc);
    const a=document.createElement("a");a.href=URL.createObjectURL(buf);a.download="preproduction.docx";a.click();
    s.textContent="저장됨 ✓";closeExportModal();
  }catch(e){console.error(e);s.textContent="저장됨 ✓";alert("Word 생성 실패: "+e.message);}
}

/* PPTX */
async function exportPptx(){
  const s=document.getElementById("save-indicator");s.textContent="PPT 생성 중...";
  try{
    const pptxgen=await import("https://esm.sh/pptxgenjs@3");
    const PptxGenJS=pptxgen.default||pptxgen;
    const prs=new PptxGenJS();
    prs.layout="LAYOUT_16x9";
    prs.defineLayout({name:"A4L",width:10,height:5.63});

    const BG="#F5F5F3";const DARK="#1a1a1a";const MID="#666666";const ACCENT="#534AB7";

    episodes.forEach(ep=>{
      /* 에피소드 타이틀 슬라이드 */
      const ts=prs.addSlide();
      ts.background={color:ACCENT};
      ts.addText(ep.name,{x:0.5,y:2,w:9,h:1.2,fontSize:32,bold:true,color:"FFFFFF",align:"center"});
      ts.addText("콘티",{x:0.5,y:3.3,w:9,h:0.5,fontSize:14,color:"CCCCCC",align:"center"});

      ep.scenes.forEach(sc=>{
        /* 씬 헤더 슬라이드 */
        const ss=prs.addSlide();
        ss.background={color:BG};
        ss.addShape(prs.ShapeType.rect,{x:0,y:0,w:10,h:0.9,fill:{color:"EEECEO"}});
        ss.addText(`${sc.num}  ${sc.location}`,{x:0.3,y:0.1,w:7,h:0.7,fontSize:18,bold:true,color:DARK});
        ss.addText(`${sc.intext||"INT"} · ${sc.daynight||"DAY"}`,{x:7.5,y:0.15,w:2.2,h:0.6,fontSize:12,color:ACCENT,align:"right"});
        if(sc.desc) ss.addText(sc.desc,{x:0.3,y:0.75,w:9.4,h:0.4,fontSize:11,color:MID});

        /* 컷 슬라이드 — 2컷씩 */
        for(let ci=0;ci<sc.cuts.length;ci+=2){
          const slide=prs.addSlide();
          slide.background={color:"#FFFFFF"};
          slide.addText(`${sc.num} · ${sc.location}`,{x:0.2,y:0.05,w:9.6,h:0.35,fontSize:9,color:"#AAAAAA"});

          [0,1].forEach(offset=>{
            const cut=sc.cuts[ci+offset];if(!cut)return;
            const xBase=offset===0?0.2:5.2;
            slide.addText(cut.num,{x:xBase,y:0.45,w:1,h:0.3,fontSize:11,bold:true,color:ACCENT});
            /* 이미지 박스 */
            if(cut.img&&cut.img.startsWith("data:")){
              try{
                const ext=cut.img.split(";")[0].split("/")[1]||"png";
                slide.addImage({data:cut.img,x:xBase,y:0.8,w:2.25,h:4,sizing:{type:"contain",w:2.25,h:4}});
              }catch(e){}
            } else {
              slide.addShape(prs.ShapeType.rect,{x:xBase,y:0.8,w:2.25,h:4,fill:{color:"EEEEEE"},line:{color:"CCCCCC",pt:0.5}});
              slide.addText("이미지 없음",{x:xBase,y:2.5,w:2.25,h:0.4,fontSize:9,color:"#AAAAAA",align:"center"});
            }
            const tx=xBase+2.4;
            if(cut.camera) slide.addText(cut.camera,{x:tx,y:0.8,w:2.2,h:0.4,fontSize:9,color:MID,italic:true});
            if(cut.action) slide.addText("행동\n"+cut.action,{x:tx,y:1.3,w:2.2,h:1.6,fontSize:10,color:DARK,valign:"top"});
            if(cut.dialogue) slide.addText("대사\n"+cut.dialogue,{x:tx,y:3.0,w:2.2,h:1.8,fontSize:10,color:DARK,valign:"top"});
          });
        }
      });
    });

    await prs.writeFile({fileName:"conti.pptx"});
    s.textContent="저장됨 ✓";closeExportModal();
  }catch(e){console.error(e);s.textContent="저장됨 ✓";alert("PPT 생성 실패: "+e.message);}
}
